<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <link rel="icon" type="image/svg+xml" href="/Tourism/favicon.svg" />
    <title>Kyrgyz Riders | Adventure Tours</title>
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('&');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <script type="text/javascript">
      (function () {
        try {
          var preference = localStorage.getItem('tourism-theme') || 'system';
          var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = preference === 'dark' || (preference === 'system' && systemDark) ? 'dark' : 'light';
          document.documentElement.classList.toggle('dark', theme === 'dark');
          document.documentElement.dataset.themePreference = preference;
          document.documentElement.style.colorScheme = theme;
        } catch (error) {
          document.documentElement.dataset.themePreference = 'system';
        }
      })();
    </script>

</html>
